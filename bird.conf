log syslog all;

include "static.conf";
include "filter.conf";

router id OWNIP_S;

protocol kernel kernel {
    ipv6 {
        import none;
        export where export_filter(0);  # No special node role for kernel export
    };

    scan time 30;
    learn on;
    merge paths on;
    graceful restart on;
    metric 100;
}

protocol device {
    scan time 10;
}

protocol direct {
    ipv6;
}

include "peers/*.conf";
include "ibgp/*.conf";
