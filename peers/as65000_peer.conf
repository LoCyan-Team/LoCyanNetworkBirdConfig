protocol bgp as65000_peer {
    local as OWNAS;
    source address OWNIPv6_S;
    # multihop;
    neighbor;
    ipv6 {
        import where import_filter(COMMUNITY_TRANSIT, 250);
        export where export_filter(COMMUNITY_TRANSIT, 0);
    };
    password "password";
    graceful restart;

    hold time 90;
    keepalive time 15;
}
